<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* back button */

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        /* name */

        .name {
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* timer */

        .timer {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* dp */

        .dp {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 35px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* control buttons */

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .controls button {
            background: #222;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        /* end button */

        .end-btn {
            background: red;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* hide audio controls */

        audio {
            display: none;
        }
    </style>

</head>

<body>

    <i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

    <div class="name" id="contactName"></div>

    <div class="timer" id="callTimer">00:00</div>

    <img id="contactDp" class="dp">

    <div class="controls">
        <button onclick="toggleMute()" id="muteBtn">Mute</button>
        <button onclick="toggleSpeaker()" id="speakerBtn">Speaker On</button>
    </div>

    <button class="end-btn" onclick="endCall()">End Call</button>

    <audio id="remoteAudio" autoplay playsinline></audio>


    <div id="incomingCallBox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
background:#222;
padding:20px;
text-align:center;
z-index:1000;
">

        <div style="font-size:18px;margin-bottom:10px;" id="callerName"></div>

        <button id="acceptCall" style="
background:#25D366;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:20px;
margin-right:15px;
cursor:pointer;
">
            Answer
        </button>

        <button id="rejectCall" style="
background:red;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:20px;
cursor:pointer;
">
            Reject
        </button>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>
    <script>eruda.init();</script>

    <script>

        const socket = io(window.location.origin, {
            transports: ["websocket"]
        })

        const loggedUser = localStorage.getItem("loggedUser")
        const receiver = localStorage.getItem("chatWith")
        const callType = localStorage.getItem("callType")

        const incomingOffer = localStorage.getItem("incomingOffer")
        const incomingFrom = localStorage.getItem("incomingFrom")

        socket.emit("register-user", loggedUser)

        let peer
        let localStream

        let isMuted = false
        let speakerOn = true

        let seconds = 0
        let timerInterval

        function startTimer() {

            timerInterval = setInterval(() => {

                seconds++

                const mins = Math.floor(seconds / 60)
                const secs = seconds % 60

                document.getElementById("callTimer").innerText =
                    String(mins).padStart(2, "0") + ":" +
                    String(secs).padStart(2, "0")

            }, 1000)

        }

        document.getElementById("contactName").innerText =
            localStorage.getItem("chatName") || receiver

        const dp = localStorage.getItem("chatDp")

        if (dp) {
            document.getElementById("contactDp").src = "/" + dp
        } else {
            document.getElementById("contactDp").src = "/uploads/profilephotodefault.png"
        }

        async function startVoiceCall() {

            localStream = await navigator.mediaDevices.getUserMedia({
                audio: true
            })

            peer = new SimplePeer({
                initiator: true,
                trickle: false,
                stream: localStream
            })

            peer.on("signal", data => {

                socket.emit("call-user", {
                    to: receiver,
                    offer: data,
                    from: loggedUser,
                    type: "voice"
                })

            })

            peer.on("stream", stream => {

                const audio = document.getElementById("remoteAudio")
                audio.srcObject = stream
                audio.play()

                startTimer()

            })
        }

        socket.on("incoming-call", ({ from, offer, type }) => {

            if (type !== "voice") return

            const callBox = document.getElementById("incomingCallBox")
            const callerName = document.getElementById("callerName")

            callerName.innerText = "Incoming voice call from " + from

            callBox.style.display = "block"

            document.getElementById("acceptCall").onclick = async () => {

                callBox.style.display = "none"

                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: true
                })

                peer = new SimplePeer({
                    initiator: false,
                    trickle: false,
                    stream: localStream
                })

                peer.on("signal", data => {

                    socket.emit("answer-call", {
                        to: from,
                        answer: data
                    })

                })

                peer.on("stream", stream => {

                    const audio = document.getElementById("remoteAudio")
                    audio.srcObject = stream
                    audio.play()

                    startTimer()

                })

                peer.signal(offer)

            }

            document.getElementById("rejectCall").onclick = () => {
                socket.emit("missed-call", {
                    to: from,
                    from: loggedUser,
                    type: "voice"
                })
                callBox.style.display = "none"
            }

        })

        socket.on("call-answered", ({ answer }) => {
            peer.signal(answer)
        })

        socket.on("call-ended", () => {
            alert("Call ended by other user")
            window.location.href = "/chat.html"
        })

        function endCall() {

            socket.emit("end-call", {
                to: receiver,
                from: loggedUser,
                type: "voice",
                duration: seconds
            })

            if (peer) {
                peer.destroy()
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop())
            }

            clearInterval(timerInterval)

            localStorage.removeItem("callType")
            localStorage.removeItem("incomingOffer")
            localStorage.removeItem("incomingFrom")

            window.location.href = "/chat.html"

        }

        function toggleMute() {

            if (!localStream) return

            localStream.getAudioTracks().forEach(track => {
                track.enabled = isMuted
            })

            isMuted = !isMuted

            document.getElementById("muteBtn").innerText =
                isMuted ? "Unmute" : "Mute"

        }

        function toggleSpeaker() {

            const audio = document.getElementById("remoteAudio")

            if (speakerOn) {
                audio.volume = 0.2
                document.getElementById("speakerBtn").innerText = "Speaker Off"
            } else {
                audio.volume = 1
                document.getElementById("speakerBtn").innerText = "Speaker On"
            }

            speakerOn = !speakerOn

        }

        function goBack() {
            window.location.href = "/chat.html"
        }

        if (callType === "caller") {
            startVoiceCall()
        }

        else if (callType === "receiver" && incomingOffer) {

            localStream = navigator.mediaDevices.getUserMedia({
                audio: true
            }).then(stream => {

                localStream = stream

                peer = new SimplePeer({
                    initiator: false,
                    trickle: false,
                    stream: localStream
                })

                peer.on("signal", data => {
                    socket.emit("answer-call", {
                        to: incomingFrom,
                        answer: data
                    })
                })

                peer.on("stream", stream => {
                    document.getElementById("remoteAudio").srcObject = stream
                    startTimer()
                })

                peer.signal(JSON.parse(incomingOffer))

            })

        }

    </script>

</body>

</html>
