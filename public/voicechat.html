<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* back button */

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        /* name */

        .name {
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* timer */

        .timer {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* dp */

        .dp {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 35px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* control buttons */

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .controls button {
            background: #222;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        /* end button */

        .end-btn {
            background: red;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* hide audio controls */

        audio {
            display: none;
        }
    </style>

</head>

<body>

    <i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

    <div class="name" id="contactName"></div>

    <div class="timer" id="callTimer">00:00</div>

    <img id="contactDp" class="dp">

    <div class="controls">
        <button onclick="toggleMute()" id="muteBtn">Mute</button>
        <button onclick="toggleSpeaker()" id="speakerBtn">Speaker On</button>
    </div>

    <button class="end-btn" onclick="endCall()">End Call</button>

    <audio id="remoteAudio" autoplay playsinline></audio>


    <div id="incomingCallBox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
background:#222;
padding:20px;
text-align:center;
z-index:1000;
">

        <div style="font-size:18px;margin-bottom:10px;" id="callerName"></div>

        <button id="acceptCall" style="
background:#25D366;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:20px;
margin-right:15px;
cursor:pointer;
">
            Answer
        </button>

        <button id="rejectCall" style="
background:red;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:20px;
cursor:pointer;
">
            Reject
        </button>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>
    <script>eruda.init();</script>

    <script>

        const socket = io(window.location.origin, { transports: ["websocket"] })

        const loggedUser = localStorage.getItem("loggedUser")
        const receiver = localStorage.getItem("chatWith")
        const callType = localStorage.getItem("callType")

        socket.emit("register-user", loggedUser)

        let localStream
        let peers = {}
        let seconds = 0
        let timerInterval

        /* ---------------- STREAM ---------------- */

        async function initLocalStream() {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                })
            }
        }
        document.getElementById("contactName").innerText =
            localStorage.getItem("chatName") || receiver

        const dp = localStorage.getItem("chatDp")

        if (dp) {
            document.getElementById("contactDp").src = dp
        } else {
            document.getElementById("contactDp").src = "/profilephotodefault.png"
        }

        /* ---------------- TIMER ---------------- */

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++
                const mins = Math.floor(seconds / 60)
                const secs = seconds % 60

                document.getElementById("callTimer").innerText =
                    String(mins).padStart(2, "0") + ":" +
                    String(secs).padStart(2, "0")
            }, 1000)
        }

        /* ---------------- JOIN ---------------- */

        function joinCallRoom() {
            socket.emit("join-call", {
                user1: loggedUser,
                user2: receiver
            })
        }

        /* ---------------- PEER ---------------- */

        function createPeer(user, initiator, signal = null) {

            if (peers[user]) return

            const peer = new SimplePeer({
                initiator,
                trickle: false,
                stream: localStream
            })

            peers[user] = peer

            peer.on("signal", data => {

                console.log("📡 SIGNAL:", data.type)

                if (initiator) {
                    socket.emit("call-user", {
                        to: user,
                        from: loggedUser,
                        offer: data,
                        type: "voice"
                    })
                } else {
                    socket.emit("answer-call", {
                        to: user,
                        answer: data
                    })
                }
            })

            peer.on("stream", stream => {
                console.log("🔊 STREAM RECEIVED from:", user)

                const audio = document.getElementById("remoteAudio")
                audio.srcObject = stream
                audio.play().catch(() => { })

                startTimer()
            })

            peer.on("connect", () => {
                console.log("✅ PEER CONNECTED with:", user)
            })

            if (signal) {
                peer.signal(signal)
            }
        }

        /* ---------------- CALL START ---------------- */

        async function startCall() {

            await initLocalStream()

            joinCallRoom()

            console.log("📥 Caller joined")

            socket.emit("voice-call-start", {
                to: receiver,
                from: loggedUser,
                type: "voice"
            })
        }

        /* ---------------- USER JOINED (MAIN LOGIC) ---------------- */

        socket.on("user-joined-call", async ({ user }) => {

            if (user === loggedUser) return

            console.log("👥 user joined:", user)

            await initLocalStream()

            // 🔥 EXACT GROUP LOGIC
            createPeer(user, true)

            if (!peers[user]) {
                createPeer(user, false)
            }
        })

        /* ---------------- INCOMING CALL ---------------- */

        socket.on("incoming-call", async ({ from, offer, type }) => {

            if (type !== "voice") return

            console.log("📞 Incoming call from:", from)

            // 🔥 IF OFFER EXISTS → DIRECT CONNECT (notification case)
            if (offer) {
                await initLocalStream()
                createPeer(from, false, offer)
                return
            }

            // 🔥 SHOW POPUP (online case)
            const callBox = document.getElementById("incomingCallBox")
            const callerName = document.getElementById("callerName")

            callerName.innerText = "Incoming voice call from " + from
            callBox.style.display = "block"

            document.getElementById("acceptCall").onclick = async () => {

                callBox.style.display = "none"

                await initLocalStream()

                joinCallRoom()

                console.log("📥 Receiver accepted call")
            }

            document.getElementById("rejectCall").onclick = () => {
                callBox.style.display = "none"
            }
        })

        /* ---------------- ANSWER ---------------- */

        socket.on("call-answered", ({ from, answer }) => {

            console.log("📥 ANSWER RECEIVED from:", from)

            if (peers[from]) {
                peers[from].signal(answer)
            }
        })

        /* ---------------- END ---------------- */

        socket.on("call-ended", () => {
            alert("Call ended")
            window.location.href = "/chat.html"
        })

        function endCall() {

            socket.emit("end-call", {
                to: receiver,
                from: loggedUser,
                type: "voice",
                duration: seconds
            })

            Object.values(peers).forEach(p => p.destroy())

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop())
            }

            clearInterval(timerInterval)

            window.location.href = "/chat.html"
        }

        /* ---------------- START FLOW ---------------- */

        if (callType === "caller") {
            startCall()
        }

        if (callType === "receiver") {
            (async () => {
                await initLocalStream()
                joinCallRoom()
                console.log("📥 Receiver joined")
            })()
        }

    </script>
</body>

</html>
