<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#075E54">
    <title>Voice Call</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="/manifest.json">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* back button */

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        /* name */

        .name {
            font-size: 24px;
            margin-bottom: 8px;
        }

        /* timer */

        .timer {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* dp */

        .dp {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 35px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* control buttons */

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .controls button {
            background: #222;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        /* end button */

        .end-btn {
            background: red;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* hide audio controls */

        audio {
            display: none;
        }
    </style>

</head>

<body>

    <i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

    <div class="name" id="contactName"></div>

    <div class="timer" id="callTimer">00:00</div>

    <img id="contactDp" class="dp">

    <div class="controls">
        <button onclick="toggleMute()" id="muteBtn">Mute</button>
        <button onclick="toggleSpeaker()" id="speakerBtn">Speaker On</button>
    </div>

    <button class="end-btn" onclick="endCall()">End Call</button>
    <audio id="ringtone" loop>
        <source src="/ringtone.mp3" type="audio/mpeg">
    </audio>

    <audio id="remoteAudio" autoplay playsinline></audio>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>
    <script>eruda.init();</script>

    <script>

        const socket = io(window.location.origin, { transports: ["websocket"] })

        const loggedUser = localStorage.getItem("loggedUser")
        let receiver = localStorage.getItem("chatWith")
        let vibrationInterval

        const params = new URLSearchParams(window.location.search)

        const fromParam = params.get("from")
        const nameParam = params.get("name")

        if (fromParam) {
            receiver = fromParam

            // ✅ IMPORTANT: override old chat
            localStorage.setItem("chatWith", fromParam)

            // ✅ SET CORRECT NAME (VERY IMPORTANT)
            if (nameParam) {
                localStorage.setItem("chatName", nameParam)
            }
        }
        const callType = localStorage.getItem("callType")
        let callTimeout
        const ringtone = document.getElementById("ringtone")

        socket.emit("register-user", loggedUser)
        socket.emit("join-chat", {
            user: loggedUser,
            chatId: receiver,
            isGroup: false
        })

        let localStream
        let peers = {}
        let seconds = 0
        let timerInterval
        let incomingCaller = null
        let callConnected = false
        let isCallStarted = false

        /* ---------------- STREAM ---------------- */

        async function initLocalStream() {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                })
            }
        }

        function startRinging() {
            if (callConnected) return
            ringtone.currentTime = 0
            ringtone.play().catch(() => { })
        }

        function stopRinging() {
            ringtone.pause()
            ringtone.currentTime = 0
        }
        // document.getElementById("contactName").innerText =
        //     localStorage.getItem("chatName") || receiver

        // const dp = localStorage.getItem("chatDp")

        // if (dp) {
        //     document.getElementById("contactDp").src = dp
        // } else {
        //     document.getElementById("contactDp").src = "/profilephotodefault.png"
        // }
        async function loadCallerInfo() {

            try {
                const res = await fetch(`/get-profile/${receiver}`)
                const data = await res.json()

                console.log("Caller data:", data)

                // ✅ NAME
                // document.getElementById("contactName").innerText =
                //     data.username || receiver
                // ✅ FIRST CHECK LOCAL CONTACT NAME
                // ✅ STEP 1: get saved contacts
                const resContacts = await fetch(`/getcontacts/${loggedUser}`)
                const contacts = await resContacts.json()

                // ✅ STEP 2: find correct contact
                const matchedContact = contacts.find(c => c.email === receiver)

                // ✅ STEP 3: set name correctly
                if (matchedContact) {
                    document.getElementById("contactName").innerText = matchedContact.name
                } else {
                    document.getElementById("contactName").innerText =
                        data.username || receiver
                }

                // ✅ DP
                if (data.profileimage) {
                    document.getElementById("contactDp").src = data.profileimage
                } else {
                    document.getElementById("contactDp").src = "/profilephotodefault.png"
                }

            } catch (err) {
                console.log("Error loading caller info:", err)

                document.getElementById("contactName").innerText = receiver
                document.getElementById("contactDp").src = "/profilephotodefault.png"
            }
        }

        // 🔥 CALL IT HERE
        loadCallerInfo()

        /* ---------------- TIMER ---------------- */

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++
                const mins = Math.floor(seconds / 60)
                const secs = seconds % 60

                document.getElementById("callTimer").innerText =
                    String(mins).padStart(2, "0") + ":" +
                    String(secs).padStart(2, "0")
            }, 1000)
        }

        /* ---------------- JOIN ---------------- */

        function joinCallRoom() {
            socket.emit("join-call", {
                user1: loggedUser,
                user2: receiver
            })
        }

        /* ---------------- PEER ---------------- */

        function createPeer(user, initiator, signal = null) {

            if (peers[user]) return

            const peer = new SimplePeer({
                initiator,
                trickle: false,
                stream: localStream
            })

            peers[user] = peer

            peer.on("signal", data => {

                console.log("📡 SIGNAL:", data.type)

                if (initiator && callType === "caller") {
                    socket.emit("call-user", {
                        to: user,
                        from: loggedUser,
                        offer: data,
                        type: "voice"
                    })
                } else if (!initiator){
                    socket.emit("answer-call", {
                        to: user,
                        answer: data
                    })
                }
            })

            peer.on("stream", stream => {
                callConnected = true
                stopRinging()          // 🔥 stop ringtone
                clearTimeout(callTimeout) // 🔥 stop timeout
                console.log("🔊 STREAM RECEIVED from:", user)

                const audio = document.getElementById("remoteAudio")
                audio.srcObject = stream
                audio.play().catch(() => { })

                startTimer()
            })

            peer.on("connect", () => {
                console.log("✅ PEER CONNECTED with:", user)
            })

            if (signal) {
                peer.signal(signal)
            }
        }

        /* ---------------- CALL START ---------------- */

        async function startCall() {

            startRinging() // 🔥 start ringtone

            // ⏳ auto cut after 60 sec
            callTimeout = setTimeout(() => {
                socket.emit("call-timeout", {
                    from: loggedUser,
                    to: receiver,
                    type: "voice"
                })
                alert("Call not answered")
                endCall()
            }, 60000)

            if (isCallStarted) return
            isCallStarted = true
            await initLocalStream()

            joinCallRoom()

            console.log("📥 Caller joined")

            socket.emit("voice-call-start", {
                to: receiver,
                from: loggedUser,
                type: "voice"
            })
        }

        /* ---------------- USER JOINED (MAIN LOGIC) ---------------- */

        socket.on("user-joined-call", async ({ user }) => {

            if (user === loggedUser) return

            console.log("👥 user joined:", user)

            await initLocalStream()

            // 🔥 EXACT GROUP LOGIC
            // createPeer(user, true)

            // if (!peers[user]) {
            //     createPeer(user, false)
            // }
            if (callType === "caller") {
                createPeer(user, true)
            }
        })

        /* ---------------- INCOMING CALL ---------------- */

        socket.on("incoming-call", async ({ from, offer, type }) => {
            if (!callConnected) {
                startRinging()
            }

            if (type !== "voice") return


            console.log("📞 Incoming call from:", from)
            const currentChat = localStorage.getItem("chatWith")
            console.log("current chat is: ", currentChat)

            // ❌ IF NOT SAME CHAT → DO NOTHING (USE NOTIFICATION)
            if (currentChat !== from) {
                alert("❌ Not active chat → skip popup")
                return
            }
            // ✅ VERY IMPORTANT: store real caller
            incomingCaller = from

            // ✅ UPDATE RECEIVER (FIX CORE BUG)
            receiver = from

            localStorage.setItem("chatWith", from)
            localStorage.setItem("chatName", from)

            // ✅ UPDATE UI IMMEDIATELY
            loadCallerInfo()

            // 🔥 IF OFFER EXISTS → DIRECT CONNECT (notification case)
            if (offer) {
    
                await initLocalStream()
                createPeer(from, false, offer)
                return
            }

            // 🔥 SHOW POPUP (online case)
            const callBox = document.getElementById("incomingCallBox")
            const callerName = document.getElementById("callerName")

            callerName.innerText = "Incoming voice call from " + from
            callBox.style.display = "block"

            document.getElementById("acceptCall").onclick = async () => {
                stopRinging()
                clearTimeout(callTimeout)

                callBox.style.display = "none"

                receiver = incomingCaller

                console.log("✅ Accepting call from:", receiver)

                await initLocalStream()

                joinCallRoom()

                console.log("📥 Receiver accepted call")
            }

            document.getElementById("rejectCall").onclick = () => {
                stopRinging()
                clearTimeout(callTimeout)
                socket.emit("call-rejected", {
                    to: incomingCaller,
                    from: loggedUser
                })
                callBox.style.display = "none"
            }
        })

        /* ---------------- ANSWER ---------------- */

        socket.on("call-answered", ({ from, answer }) => {

            console.log("📥 ANSWER RECEIVED from:", from)

            if (peers[from]) {
                peers[from].signal(answer)
            }
        })

        /* ---------------- END ---------------- */

        socket.on("call-ended", ({ from }) => {

            alert("Call ended")

            // 🔥 ALWAYS USE FROM (REAL OTHER USER)
            const otherUser = from || receiver

            localStorage.setItem("chatWith", otherUser)

            const isGroup = false
            const name = localStorage.getItem("chatName") || otherUser

            window.location.href =
                `/chat.html?from=${otherUser}&isGroup=${isGroup}&name=${name}&openChat=true`
        })
        socket.on("call-rejected", ({ from }) => {

            console.log("❌ Call rejected by:", from)

            // alert("Call rejected")

            stopRinging()
            clearTimeout(callTimeout)
            Object.values(peers).forEach(p => p.destroy())
            peers = {}

            // 🔥 STOP LOCAL STREAM
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop())
                localStream = null
            }

            // 🔥 STOP TIMER
            clearInterval(timerInterval)
            alert("Call rejected")

            // window.location.href = "/chat.html"
            // const receiver = localStorage.getItem("chatWith")
            const isGroup = localStorage.getItem("isGroup") === "true"
            const name = localStorage.getItem("chatName") || ""

            window.location.href =
                `/chat.html?from=${receiver}&isGroup=${isGroup}&name=${name}&openChat=true`
        })
        document.body.addEventListener("click", () => {
            if (!callConnected) {
                ringtone.play().catch(() => { })
            }
        }, { once: true })
        function endCall() {

            stopRinging()
            clearTimeout(callTimeout)

            socket.emit("end-call", {
                to: receiver,
                from: loggedUser,
                type: "voice",
                duration: seconds
            })
            socket.emit("leave-chat", loggedUser)

            Object.values(peers).forEach(p => p.destroy())
            peers = {}
            callConnected = false   // 🔥 ADD THIS
            seconds = 0

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop())
            }

            clearInterval(timerInterval)

            // window.location.href = "/chat.html"
            // const receiver = localStorage.getItem("chatWith")
            const isGroup = localStorage.getItem("isGroup") === "true"
            const name = localStorage.getItem("chatName") || ""

            window.location.href =
                `/chat.html?from=${receiver}&isGroup=${isGroup}&name=${name}&openChat=true`
        }

        /* ---------------- START FLOW ---------------- */

        if (callType === "caller") {
            startCall()
        }

        if (callType === "receiver") {
            (async () => {
                await initLocalStream()
                joinCallRoom()
                console.log("📥 Receiver joined")
                socket.emit("request-offer", {
                    from: loggedUser
                })
            })()
        }

    </script>
</body>

</html>
