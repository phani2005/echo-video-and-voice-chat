        function downloadFile(url, filename) {

            fetch(url)
                .then(async res => {

                    if (!res.ok) {
                        throw new Error("File fetch failed")
                    }

                    const blob = await res.blob()

                    const blobUrl = window.URL.createObjectURL(blob)

                    const a = document.createElement("a")
                    a.href = blobUrl
                    a.download = filename

                    document.body.appendChild(a)
                    a.click()

                    a.remove()
                    window.URL.revokeObjectURL(blobUrl)
                })
                .catch(err => {
                    console.error("Download error:", err)
                    alert("Download failed")
                })
        }
        function handleFileClick(url, fileName) {

            }

            // ✅ DIRECT DOWNLOAD (BEST FOR ALL FILES)
            const a = document.createElement("a")
            a.href = url
            a.download = fileName
            document.body.appendChild(a)
            a.click()
            a.remove()
        }

                        text: replyingMessage.message,

            if (isGroup) {

                    ...payload
                })
            } else {
                socket.emit("private-message", payload)
            }

            input.value = ""
            cancelReply()
            chatBody.scrollTop = chatBody.scrollHeight
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4)
            const base64 = (base64String + padding)
                .replace(/-/g, '+')
                .replace(/_/g, '/')

            const rawData = window.atob(base64)
            const outputArray = new Uint8Array(rawData.length)

            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i)
            }
            return outputArray
        }

            const msgDate = new Date(date)
            const today = new Date()

            const yesterday = new Date()
            yesterday.setDate(today.getDate() - 1)

            if (msgDate.toDateString() === today.toDateString()) {
                return "Today"
            }

            if (msgDate.toDateString() === yesterday.toDateString()) {
                return "Yesterday"
            }

            const day = String(msgDate.getDate()).padStart(2, "0")
            const month = String(msgDate.getMonth() + 1).padStart(2, "0")
            const year = msgDate.getFullYear()

            return `${day}/${month}/${year}`
        }
        function insertDateDivider(timestamp) {

            const msgDate = new Date(timestamp).toDateString()

            if (lastMessageDate !== msgDate) {

                lastMessageDate = msgDate

                const divider = document.createElement("div")
                divider.className = "date-divider"

                const label = getDateLabel(timestamp)

                divider.innerHTML = `<span>${label}</span>`

                chatBody.appendChild(divider)
            }
        }
        function openImageModal(url) {

            const modal = document.getElementById("imageModal")
            const img = document.getElementById("modalImage")
            const downloadBtn = document.getElementById("downloadImage")

            modal.style.display = "block"
            img.src = url

            // ✅ download button
            downloadBtn.href = url
        }
        function addMessage(msgObj, type) {

            insertDateDivider(msgObj.timestamp)
            const msg = document.createElement("div")
            msg.className = "message " + type
            let startX = 0

            msg.addEventListener("touchstart", (e) => {
                startX = e.touches[0].clientX
            })

            msg.addEventListener("touchend", (e) => {
                let endX = e.changedTouches[0].clientX

                if (endX - startX > 80 && Math.abs(endX - startX) > 50) { // swipe right
                    startReply(msgObj)
                }
            })
            let replyBlock = ""

            if (msgObj.replyTo) {
                replyBlock = `
        <div class="reply-box" 
             onclick="scrollToMessage('${msgObj.replyTo.messageId}')"
             style="border-left:3px solid green; padding:5px; margin-bottom:5px; background:#f0f0f0; cursor:pointer;">
             
            <small>${msgObj.replyTo.from === loggedUser ? "You" : msgObj.replyTo.from}</small><br>
            ${msgObj.replyTo.text || "File"}
        </div>
    `
            }

            let content = ""
            let senderLabel = ""
            if (isGroup && msgObj.from !== loggedUser) {

                let senderName = msgObj.from

                if (contactNames[msgObj.from]) {
                    senderName = contactNames[msgObj.from]
                }

                senderLabel = `
        <small style="color:#075E54;font-weight:bold">
            ${senderName}
        </small><br>
    `
            }

            if (msgObj.type === "image") {
                content = `
    <img src="${msgObj.message}" 
         style="max-width:200px;border-radius:10px;cursor:pointer;"
         onclick="openImageModal('${msgObj.message}')">
`
            }
            else if (msgObj.type === "video") {

                let videoUrl = msgObj.message

                // 🔥 FIX cloudinary wrong path
                // videoUrl = videoUrl.replace("/image/upload/", "/video/upload/")

                content = `
    <video controls width="200">
        <source src="${msgObj.message}" type="video/mp4">
    </video>
    `
            }
            else if (msgObj.type === "audio") {
                content = `<audio controls>
                     <source src="${msgObj.message}">
                   </audio>`
            }
            else if (
                msgObj.type === "file" ||
                msgObj.type === "pdf" ||
                msgObj.type === "word"
            ) {

                const fileName = msgObj.originalName || msgObj.message.split("/").pop()
                const ext = fileName.split(".").pop().toLowerCase()

                let icon = "📄"

                if (ext === "pdf") icon = "📕"
                else if (ext === "doc" || ext === "docx") icon = "📝"
                else if (ext === "ppt" || ext === "pptx") icon = "📊"
                else if (ext === "xls" || ext === "xlsx") icon = "📈"
                let fileUrl = msgObj.message

                // 🔥 FIX PDF WRONG PATH
                if (ext === "pdf") {
                    fileUrl = fileUrl.replace("/image/upload/", "/raw/upload/")
                }

                content = `
    <div onclick="handleFileClick('${fileUrl}', '${fileName}')"
         style="
            display:flex;
            align-items:center;
            gap:10px;
            padding:10px;
            background:${type === "sent" ? "#dcf8c6" : "#fff"};
            border-radius:10px;
            cursor:pointer;
            max-width:230px;
         ">

        <span style="font-size:22px">${icon}</span>

        <div>
            <div style="font-size:14px;">${fileName}</div>
            <div style="font-size:12px;color:gray;">${ext.toUpperCase()}</div>
        </div>
    </div>
    `
            } else {
                // content = msgObj.message
                content = `<div class="msg-text">${msgObj.message}</div>`
            }

            let tick = ""

            if (type === "sent") {
                if (!msgObj.delivered) tick = "✓"
                if (msgObj.delivered && !msgObj.seen) tick = "✓✓"
                if (msgObj.seen) tick = `<span style="color:blue">✓✓</span>`
            }

            const time = formatTime(msgObj.timestamp)

            msg.innerHTML = `
    ${senderLabel}
    ${replyBlock}   
    ${content}
    <span class="time">${time} ${tick}</span>
`
            msg.setAttribute("data-id", msgObj._id)
            if (selectMode) {
                const checkbox = document.createElement("input")
                checkbox.type = "checkbox"
                checkbox.className = "msg-checkbox"

                checkbox.addEventListener("change", () => {
                    if (checkbox.checked)
                        selectedMessages.add(msgObj._id)
                    else
                        selectedMessages.delete(msgObj._id)
                })

                msg.prepend(checkbox)
            }
            msg.addEventListener("dblclick", () => {
                startReply(msgObj)
            })
            chatBody.appendChild(msg)
        }
        function scrollToMessage(id) {

            const target = document.querySelector(`.message[data-id="${id}"]`)

            if (target) {
                target.scrollIntoView({ behavior: "smooth", block: "center" })

                target.style.background = "#ffff99"

                setTimeout(() => {
                    target.style.background = ""
                }, 2000)
            }
        }
        function closeImageModal() {
            document.getElementById("imageModal").style.display = "none"
        }
        function formatTime(time) {
            const date = new Date(time)
            return date.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            })
        }
        async function startCall() {

            document.getElementById("callModal").style.display = "block"

            localStream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: true
            })

            document.getElementById("localVideo").srcObject = localStream

            peerConnection = new RTCPeerConnection(servers)

            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream)
            })

            peerConnection.ontrack = event => {
                document.getElementById("remoteVideo").srcObject = event.streams[0]
            }

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.emit("ice-candidate", {
                        to: receiverEmail,
                        candidate: event.candidate
                    })
                }
            }

            const offer = await peerConnection.createOffer()
            await peerConnection.setLocalDescription(offer)

            socket.emit("call-user", {
                to: receiverEmail,
                offer,
                from: loggedUser
            })
        }
        socket.on("incoming-call", ({ from, offer, type }) => {
            const currentChat = localStorage.getItem("chatWith")

            console.log("📞 Incoming call from:", from)
            console.log("Current chat:", currentChat)

            // ❌ IF USER IS NOT IN THAT CHAT → SKIP POPUP
            if (currentChat !== from) {
                console.log("❌ Different chat → skip popup, use notification")
                return
            }


            const accept = confirm(`Incoming ${type} call from ${from}`)

            if (!accept) {
                console.log("❌ Call rejected in chat.html")

                // 🔥 VERY IMPORTANT
                socket.emit("call-rejected", {
                    to: from,
                    from: loggedUser
                })

                return
            }

            localStorage.setItem("callType", "receiver")
            localStorage.setItem("incomingOffer", JSON.stringify(offer))
            localStorage.setItem("incomingFrom", from)

            if (type === "voice") {
                window.location.href = isGroup
                    ? "/groupvoicecall.html"
                    : "/voicechat.html"
            }

            if (type === "video") {
                window.location.href = isGroup
                    ? "/groupvideocall.html"
                    : "/videocall.html"
            }

        })
        socket.on("incoming-group-call", ({ from, groupId, type }) => {

            const accept = confirm(`Group ${type} call from ${from}`)

            if (!accept) return

            localStorage.setItem("chatWith", groupId)
            localStorage.setItem("callType", "receiver")

            if (type === "video") {
                window.location.href = "/groupvideocall.html"
            } else {
                window.location.href = "/groupvoicecall.html"
            }
        })
        socket.on("call-answered", async ({ answer }) => {
            await peerConnection.setRemoteDescription(
                new RTCSessionDescription(answer)
            )
        })
        socket.on("ice-candidate", async ({ candidate }) => {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(
                        new RTCIceCandidate(candidate)
                    )
                } catch (err) {
                    console.error("ICE error:", err)
                }
            }
        })
        function endCall() {

            if (peerConnection) {
                peerConnection.close()
                peerConnection = null
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop())
            }

            document.getElementById("callModal").style.display = "none"
        }

    </script>

    <div id="imageModal" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:9999;
">

        <!-- TOP BAR -->
        <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 20px;
        background:rgba(0,0,0,0.7);
        position:absolute;
        top:0;
        width:100%;
    ">
            <button onclick="closeImageModal()" style="background:red;color:white;
                   border:none;padding:8px 15px;
                   border-radius:5px;">
                Close
            </button>

            <a id="downloadImage" download style="background:#25D366;color:white;
                   padding:8px 15px;
                   border-radius:5px;
                   text-decoration:none;">
                Download
            </a>
        </div>

        <!-- IMAGE CENTER -->
        <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100%;
    ">
            <img id="modalImage" style="max-width:95%;max-height:95%;object-fit:contain;">
        </div>

    </div>
