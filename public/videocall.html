<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: black;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* remote video full screen */

        #remoteVideo {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: black;
        }

        /* small local video */

        #localVideo {
            position: absolute;
            width: 120px;
            height: 170px;
            object-fit: cover;
            right: 15px;
            top: 80px;
            border-radius: 12px;
            border: 2px solid white;
        }

        /* top name */

        .topBar {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
        }

        /* control buttons */

        .controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .end {
            background: red;
            color: white;
        }

        .mute {
            background: #333;
            color: white;
        }

        .camera {
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

    <div class="topBar" id="contactName"></div>

    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>

    <div class="controls">

        <button class="btn mute" id="muteBtn" onclick="toggleMute()">
            <i class="fa-solid fa-microphone"></i>
        </button>

        <button class="btn camera" id="cameraBtn" onclick="toggleCamera()">
            <i class="fa-solid fa-video"></i>
        </button>

        <!-- <button class="btn camera" onclick="switchCamera()">
            <i class="fa-solid fa-rotate" id="rotate"></i>
        </button> -->

        <button class="btn end" onclick="endCall()">
            <i class="fa-solid fa-phone-slash"></i>
        </button>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>

    <script>

        const socket = io(window.location.origin, { transports: ["websocket"] })

        const loggedUser = localStorage.getItem("loggedUser")
        const receiver = localStorage.getItem("chatWith")
        const callType = localStorage.getItem("callType")

        socket.emit("register-user", loggedUser)

        let localStream
        let peers = {}
        let seconds = 0
        let timerInterval
        let isMuted = false
        let cameraOff = false

        /* ---------------- STREAM ---------------- */

        async function initLocalStream() {

            if (!localStream) {

                localStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                })

                document.getElementById("localVideo").srcObject = localStream
            }
        }

        /* ---------------- TIMER ---------------- */

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++
            }, 1000)
        }

        /* ---------------- JOIN ---------------- */

        function joinCallRoom() {
            socket.emit("join-call", {
                user1: loggedUser,
                user2: receiver
            })
        }

        /* ---------------- PEER ---------------- */

        function createPeer(user, initiator, signal = null) {

            if (peers[user]) return

            const peer = new SimplePeer({
                initiator,
                trickle: false,
                stream: localStream
            })

            peers[user] = peer

            peer.on("signal", data => {

                console.log("📡 SIGNAL:", data.type)

                if (initiator) {
                    socket.emit("call-user", {
                        to: user,
                        from: loggedUser,
                        offer: data,
                        type: "video"
                    })
                } else {
                    socket.emit("answer-call", {
                        to: user,
                        answer: data
                    })
                }
            })

            peer.on("stream", stream => {

                console.log("🎥 STREAM RECEIVED from:", user)

                document.getElementById("remoteVideo").srcObject = stream

                startTimer()
            })

            peer.on("connect", () => {
                console.log("✅ PEER CONNECTED with:", user)
            })

            if (signal) {
                peer.signal(signal)
            }
        }

        /* ---------------- START CALL ---------------- */

        async function startCall() {

            await initLocalStream()

            joinCallRoom()

            console.log("📥 Caller joined video call")

            socket.emit("call-user", {
                to: receiver,
                from: loggedUser,
                type: "video"
            })
        }

        /* ---------------- USER JOINED ---------------- */

        socket.on("user-joined-call", async ({ user }) => {

            if (user === loggedUser) return

            console.log("👥 user joined:", user)

            await initLocalStream()

            // 🔥 SAME AS VOICE
            createPeer(user, true)

            if (!peers[user]) {
                createPeer(user, false)
            }
        })

        /* ---------------- INCOMING CALL ---------------- */

        socket.on("incoming-call", async ({ from, offer, type }) => {

            if (type !== "video") return

            console.log("📞 Incoming VIDEO call from:", from)

            // 🔥 notification case (offer exists)
            if (offer) {
                await initLocalStream()
                createPeer(from, false, offer)
                return
            }

            // 🔥 online popup
            const accept = confirm("Incoming video call from " + from)

            if (!accept) {
                socket.emit("missed-call", {
                    to: from,
                    from: loggedUser,
                    type: "video"
                })
                return
            }

            await initLocalStream()

            joinCallRoom()

            console.log("📥 Receiver accepted video call")
        })

        /* ---------------- ANSWER ---------------- */

        socket.on("call-answered", ({ from, answer }) => {

            console.log("📥 ANSWER RECEIVED from:", from)

            if (peers[from]) {
                peers[from].signal(answer)
            }
        })

        /* ---------------- END ---------------- */

        socket.on("call-ended", () => {
            alert("Call ended")
            window.location.href = "/chat.html"
        })

        function endCall() {

            socket.emit("end-call", {
                to: receiver,
                from: loggedUser,
                type: "video",
                duration: seconds
            })

            Object.values(peers).forEach(p => p.destroy())

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop())
            }

            clearInterval(timerInterval)

            window.location.href = "/chat.html"
        }

        /* ---------------- CONTROLS ---------------- */

        function toggleMute() {

            if (!localStream) return

            isMuted = !isMuted

            localStream.getAudioTracks().forEach(track => {
                track.enabled = !isMuted
            })
        }

        function toggleCamera() {

            if (!localStream) return

            cameraOff = !cameraOff

            localStream.getVideoTracks().forEach(track => {
                track.enabled = !cameraOff
            })
        }

        /* ---------------- START FLOW ---------------- */

        if (callType === "caller") {
            startCall()
        }

        if (callType === "receiver") {
            (async () => {
                await initLocalStream()
                joinCallRoom()
                console.log("📥 Receiver joined video call")
            })()
        }

    </script>

</body>

</html>
