<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Group Voice Call</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        .name {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: .8;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .controls button {
            background: #222;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        .end-btn {
            background: red;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        audio {
            display: none;
        }

        .users-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 90%;
            margin-bottom: 40px;
        }

        .user-card {
            text-align: center;
        }

        .user-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #25D366;
            box-shadow: 0 0 15px rgba(0, 0, 0, .6);
        }

        .user-name {
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

    <div class="name" id="groupName">Group Call</div>

    <div class="timer" id="callTimer">00:00</div>

    <div class="users-grid" id="usersGrid"></div>

    <div class="controls">
        <button onclick="toggleMute()" id="muteBtn">Mute</button>
    </div>

    <button class="end-btn" onclick="endCall()">End Call</button>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>

    <script>

        const socket = io(window.location.origin, { transports: ["websocket"] })

        const loggedUser = localStorage.getItem("loggedUser")
        const groupId = localStorage.getItem("chatWith")
        const usersGrid = document.getElementById("usersGrid")
        let groupMembers = {}

        socket.emit("register-user", loggedUser)

        let peers = {}
        let localStream

        let seconds = 0
        let timerInterval
        let isMuted = false

        function startTimer() {

            timerInterval = setInterval(() => {

                seconds++

                const mins = Math.floor(seconds / 60)
                const secs = seconds % 60

                document.getElementById("callTimer").innerText =
                    String(mins).padStart(2, "0") + ":" +
                    String(secs).padStart(2, "0")

            }, 1000)

        }

        async function startGroupCall() {

            localStream = await navigator.mediaDevices.getUserMedia({ audio: true })

            const res = await fetch(`/group-members/${groupId}/${loggedUser}`)
            const data = await res.json()

            const members = data.members
            groupMembers = members

            document.getElementById("groupName").innerText = data.groupName

            members.forEach(member => {

                if (member.email === loggedUser) return

                createPeer(member.email, true)

            })

        }
        function addUserToUI(user) {
            if (document.getElementById("user-" + user.email)) return

            const card = document.createElement("div")
            card.className = "user-card"
            card.id = "user-" + user.email

            const dp = user.profileimage
                ? "/" + user.profileimage
                : "/uploads/profilephotodefault.png"

            card.innerHTML = `
        <img src="${dp}">
        <div class="user-name">${user.name}</div>
    `

            usersGrid.appendChild(card)
        }

        function createPeer(userEmail, initiator, signal = null) {

            const peer = new SimplePeer({
                initiator,
                trickle: false,
                stream: localStream
            })

            peers[userEmail] = peer

            peer.on("signal", data => {

                if (initiator) {

                    socket.emit("call-user", {
                        to: userEmail,
                        offer: data,
                        from: loggedUser,
                        type: "voice"
                    })

                } else {

                    socket.emit("answer-call", {
                        to: userEmail,
                        answer: data
                    })

                }

            })

            peer.on("stream", stream => {

                console.log("Remote audio received")
                const user = groupMembers.find(m => m.email === userEmail)
                if (user) {
                    addUserToUI(user)
                }

                const audio = document.createElement("audio")

                audio.srcObject = stream
                audio.autoplay = true
                audio.controls = true

                document.body.appendChild(audio)

                if (!timerInterval) {
                    startTimer()
                }

            })

            if (signal) peer.signal(signal)

        }

        socket.on("incoming-call", ({ from, offer, type }) => {

            if (type !== "voice") return

            if (!localStream) {

                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {

                        localStream = stream

                        createPeer(from, false, offer)

                    })

            } else {

                createPeer(from, false, offer)

            }

        })

        socket.on("call-answered", ({ from, answer }) => {

            if (peers[from]) {
                peers[from].signal(answer)
            }

        })

        socket.on("call-ended", () => {

            alert("Call ended")

            window.location.href = "/chat.html"

        })

        function toggleMute() {

            if (!localStream) return

            localStream.getAudioTracks().forEach(track => {
                track.enabled = isMuted
            })

            isMuted = !isMuted

            document.getElementById("muteBtn").innerText =
                isMuted ? "Unmute" : "Mute"

        }

        function endCall() {

            socket.emit("end-call", {
                to: groupId,
                from: loggedUser,
                type: "voice",
                duration: seconds
            })

            Object.values(peers).forEach(p => p.destroy())

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop())
            }

            clearInterval(timerInterval)

            window.location.href = "/chat.html"

        }

        function goBack() {
            window.location.href = "/chat.html"
        }

        startGroupCall()

    </script>

</body>

</html>
