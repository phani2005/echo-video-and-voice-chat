<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Group Voice Call</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        .name {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: .8;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .controls button {
            background: #222;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        .end-btn {
            background: red;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        audio {
            display: none;
        }

        .users-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 90%;
            margin-bottom: 40px;
        }

        .user-card {
            text-align: center;
        }

        .user-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #25D366;
            box-shadow: 0 0 15px rgba(0, 0, 0, .6);
        }

        .user-name {
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

    <div class="name" id="groupName">Group Call</div>

    <div class="timer" id="callTimer">00:00</div>

    <div class="users-grid" id="usersGrid"></div>

    <div class="controls">
        <button onclick="toggleMute()" id="muteBtn">Mute</button>
    </div>

    <button class="end-btn" onclick="endCall()">End Call</button>
    <audio id="ringtone" loop>
        <source src="/ringtone.mp3" type="audio/mpeg">
    </audio>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>

    <script>

        const socket = io(window.location.origin, { transports: ["websocket"] })
        const loggedUser = localStorage.getItem("loggedUser")

        // let loggedUser = ""

        // async function getUser() {

        //     const res = await fetch("/me", {
        //         credentials: "include"
        //     })

        //     const data = await res.json()

        //     loggedUser = data.email

        //     socket.emit("register-user", loggedUser)
        // }

        // getUser()
        const params = new URLSearchParams(window.location.search)

        let groupId = params.get("from") || localStorage.getItem("chatWith")

        localStorage.setItem("chatWith", groupId)
        localStorage.setItem("isGroup", "true")
        const usersGrid = document.getElementById("usersGrid")

        let groupMembers = []
        let peers = {}
        let localStream

        let seconds = 0
        let timerInterval
        let isMuted = false
        const ringtone = document.getElementById("ringtone")
        let callTimeout
        let isConnected = false
        const VAPID_PUBLIC_KEY = "BGBN28y8CEWU4UHdBgaOZcSBFThn8YkbScCRogRVy_sHzO_q66kfBS-sVlUr6QiE7TM7X3iRU1krbfVAuJhhOIM"

        socket.emit("register-user", loggedUser)
        subscribeUser()

        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++
                const mins = Math.floor(seconds / 60)
                const secs = seconds % 60

                document.getElementById("callTimer").innerText =
                    String(mins).padStart(2, "0") + ":" +
                    String(secs).padStart(2, "0")
            }, 1000)
        }
        function startRinging() {
            ringtone.currentTime = 0
            ringtone.play().catch(() => { })
        }

        function stopRinging() {
            ringtone.pause()
            ringtone.currentTime = 0
        }
        async function subscribeUser() {

            try {
                const registration = await navigator.serviceWorker.ready

                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: VAPID_PUBLIC_KEY
                })

                await fetch("/subscribe", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: loggedUser,
                        subscription
                    })
                })

                console.log("✅ Subscribed for push")

            } catch (err) {
                console.log("❌ Subscription error:", err)
            }

        }

        async function startGroupCall() {
            startRinging()

            callTimeout = setTimeout(() => {
                alert("No one joined the call")
                endCall()
            }, 60000)

            localStream = await navigator.mediaDevices.getUserMedia({ audio: true })

            const res = await fetch(`/group-members/${groupId}/${loggedUser}`)
            const data = await res.json()

            groupMembers = data.members
            document.getElementById("groupName").innerText = data.groupName

            const me = groupMembers.find(m => m.email === loggedUser)
            if (me) addUserToUI(me)

            // ✅ JOIN FIRST
            socket.emit("join-group-call", {
                groupId,
                user: loggedUser
            })

            // ✅ ONLY CALL IF INITIATOR
            if (localStorage.getItem("callType") !== "receiver") {

                socket.emit("group-call", {
                    groupId,
                    from: loggedUser,
                    type: "voice"
                })

            }

        }
        function addUserToUI(user) {

            if (document.getElementById("user-" + user.email)) return

            const card = document.createElement("div")
            card.className = "user-card"
            card.id = "user-" + user.email

            const dp = user.profileimage
                ? user.profileimage
                : "/profilephotodefault.png"

            card.innerHTML = `
        <img src="${dp}">
        <div class="user-name">${user.name}</div>
    `

            usersGrid.appendChild(card)
        }

        function createPeer(userEmail, initiator, signal = null) {

            if (peers[userEmail]) {
                console.log("⚠️ Peer already exists:", userEmail)
                return
            }

            const peer = new SimplePeer({
                initiator,
                trickle: false,
                stream: localStream
            })

            peers[userEmail] = peer

            peer.on("signal", data => {

                if (initiator) {

                    socket.emit("call-user", {
                        to: userEmail,
                        offer: data,
                        from: loggedUser,
                        type: "voice",
                        isGroupCall: true
                    })

                } else {

                    socket.emit("answer-call", {
                        to: userEmail,
                        answer: data
                    })
                }
            })

            peer.on("stream", stream => {
                if (!isConnected) {
                    isConnected = true
                    stopRinging()
                    clearTimeout(callTimeout)
                }

                const user = groupMembers.find(m => m.email === userEmail)
                if (user) addUserToUI(user)

                const audio = document.createElement("audio")
                audio.srcObject = stream
                audio.autoplay = true

                document.body.appendChild(audio)

                if (!timerInterval) startTimer()
            })

            peer.on("close", () => {

                console.log("❌ Peer closed:", userEmail)

                // 🔥 REMOVE FROM PEERS
                delete peers[userEmail]

                // 🔥 REMOVE USER UI
                const userCard = document.getElementById("user-" + userEmail)
                if (userCard) {
                    userCard.remove()
                }

            })

            peer.on("error", () => {

                console.log("⚠️ Peer error:", userEmail)

                delete peers[userEmail]

                const userCard = document.getElementById("user-" + userEmail)
                if (userCard) {
                    userCard.remove()
                }

            })

            if (signal) peer.signal(signal)
        }

        /* 🔥 MAIN FIX (B ↔ C CONNECTION) */
        socket.on("user-joined-call", ({ user }) => {

            if (user === loggedUser) return

            console.log("👥 user joined:", user)

            // 🔥 EXISTING USERS CALL NEW USER
            createPeer(user, true)

            // 🔥 NEW USER ALSO CONNECT BACK
            if (!peers[user]) {
                createPeer(user, false)
            }

        })

        /* 🔥 RECEIVE CALL */
        socket.on("incoming-call", ({ from, offer, type }) => {
            console.log("Group voice incoming-call function from groupvoicecall.html")

            if (type !== "voice") return

            createPeer(from, false, offer)
        })

        /* 🔥 ANSWER */
        socket.on("call-answered", ({ from, answer }) => {

            if (peers[from]) {
                peers[from].signal(answer)
            }
        })

        /* 🔥 END */
        socket.on("call-ended", () => {

            alert("Call ended")
            // window.location.href = "/chat.html"
            window.location.href =
                `/chat.html?from=${groupId}&isGroup=true&name=${document.getElementById("groupName").innerText}&openChat=true`
        })

        function toggleMute() {

            if (!localStream) return

            localStream.getAudioTracks().forEach(track => {
                track.enabled = isMuted
            })

            isMuted = !isMuted

            document.getElementById("muteBtn").innerText =
                isMuted ? "Unmute" : "Mute"
        }

        function endCall() {

            socket.emit("end-call", {
                to: groupId,
                from: loggedUser,
                type: "voice",
                duration: seconds
            })

            Object.values(peers).forEach(p => p.destroy())

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop())
            }

            clearInterval(timerInterval)

            // window.location.href = "/chat.html"
            window.location.href =
                `/chat.html?from=${groupId}&isGroup=true&name=${document.getElementById("groupName").innerText}&openChat=true`
        }

        function goBack() {
            endCall()
        }

        // START CALL
        startGroupCall()

    </script>

</body>

</html>
