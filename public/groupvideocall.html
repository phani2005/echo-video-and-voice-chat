<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Video Call</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: sans-serif;
}

.back {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 20px;
    cursor: pointer;
}

.name { font-size: 24px; margin-bottom: 10px; }
.timer { font-size: 18px; margin-bottom: 25px; opacity: .8; }

.users-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    width: 90%;
    margin-bottom: 40px;
}

.user-card {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.user-card video {
    width: 220px;
    height: 160px;
    border-radius: 12px;
    object-fit: cover;
    background: black;
}

.controls {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.controls button {
    background: #222;
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 25px;
}

.end-btn {
    background: red;
    padding: 15px 30px;
    border-radius: 30px;
}

/* Popup */
#incomingCall {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
</style>
</head>

<body>

<i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

<div class="name" id="groupName">Group Video Call</div>
<div class="timer" id="callTimer">00:00</div>

<div class="users-grid" id="usersGrid"></div>

<div class="controls">
    <button onclick="toggleMute()" id="muteBtn">Mute</button>
    <button onclick="toggleCamera()" id="camBtn">Camera Off</button>
</div>

<button class="end-btn" onclick="endCall()">End Call</button>

<!-- POPUP -->
<div id="incomingCall">
    <h2 id="callerName"></h2>
    <button onclick="acceptCall()">Accept</button>
    <button onclick="ignoreCall()">Ignore</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>

<script>

const socket = io()
const loggedUser = localStorage.getItem("loggedUser")
const groupId = localStorage.getItem("chatWith")

let peers = {}
let localStream
let groupMembers = []
let callStarted = false   // 🔥 IMPORTANT FLAG

socket.emit("register-user", loggedUser)

// ================= START CALL =================
async function startGroupCall(isCaller = false) {

    localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    })

    addLocalVideo()

    const res = await fetch(`/group-members/${groupId}/${loggedUser}`)
    const data = await res.json()
    groupMembers = data.members

    document.getElementById("groupName").innerText = data.groupName

    // 🔥 Only caller sends notification
    if (isCaller) {
        socket.emit("group-call", {
            groupId,
            from: loggedUser
        })
    }

    socket.emit("join-group-call", {
        groupId,
        user: loggedUser
    })

    callStarted = true
}

// ================= LOCAL VIDEO =================
function addLocalVideo() {
    const video = document.createElement("video")
    video.autoplay = true
    video.muted = true
    video.srcObject = localStream
    document.getElementById("usersGrid").appendChild(video)
}

// ================= CREATE PEER =================
function createPeer(userEmail, initiator, signal = null) {

    if (peers[userEmail]) return

    const peer = new SimplePeer({
        initiator,
        trickle: false,
        stream: localStream
    })

    peers[userEmail] = peer

    peer.on("signal", data => {
        if (initiator) {
            socket.emit("call-user", {
                to: userEmail,
                offer: data,
                from: loggedUser
            })
        } else {
            socket.emit("answer-call", {
                to: userEmail,
                answer: data
            })
        }
    })

    peer.on("stream", stream => {
        const video = document.createElement("video")
        video.autoplay = true
        video.srcObject = stream
        document.getElementById("usersGrid").appendChild(video)
    })

    if (signal) peer.signal(signal)
}

// ================= EVENTS =================

// 🔥 SHOW POPUP only if call not started
socket.on("incoming-group-call", ({ from }) => {

    if (callStarted) return   // 🔥 IMPORTANT FIX

    document.getElementById("incomingCall").style.display = "flex"
    document.getElementById("callerName").innerText = from + " is calling..."
})

// 🔥 ACCEPT
function acceptCall() {
    document.getElementById("incomingCall").style.display = "none"
    startGroupCall(false)
}

// 🔥 IGNORE
function ignoreCall() {
    document.getElementById("incomingCall").style.display = "none"
}

// 🔥 NEW USER JOINED
socket.on("user-joined-call", ({ user }) => {
    if (user !== loggedUser) {
        createPeer(user, true)
    }
})

// 🔥 OFFER RECEIVED
socket.on("incoming-call", ({ from, offer }) => {
    createPeer(from, false, offer)
})

// 🔥 ANSWER RECEIVED
socket.on("call-answered", ({ from, answer }) => {
    if (peers[from]) peers[from].signal(answer)
})

// ================= CONTROLS =================

function toggleMute() {
    localStream.getAudioTracks().forEach(t => t.enabled = !t.enabled)
}

function toggleCamera() {
    localStream.getVideoTracks().forEach(t => t.enabled = !t.enabled)
}

function endCall() {
    socket.emit("end-call", { to: groupId })
    location.href = "/chat.html"
}

function goBack() {
    endCall()
}

// ================= START =================

// 🔥 CALLER ONLY
startGroupCall(true)

</script>

</body>
</html>
