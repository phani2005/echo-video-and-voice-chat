<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Video Call</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: sans-serif;
}
.users-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}
video {
    width: 220px;
    height: 160px;
    border-radius: 10px;
    object-fit: cover;
}
</style>
</head>

<body>

<h2 id="groupName">Group Call</h2>
<div id="usersGrid" class="users-grid"></div>

<script>

const socket = io()
const loggedUser = localStorage.getItem("loggedUser")
const groupId = localStorage.getItem("chatWith")

let peers = {}
let localStream
let groupMembers = []

socket.emit("register-user", loggedUser)

// ✅ START CALL
async function startCall() {

    localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    })

    addVideo("You", localStream, true)

    const res = await fetch(`/group-members/${groupId}/${loggedUser}`)
    const data = await res.json()

    groupMembers = data.members
    document.getElementById("groupName").innerText = data.groupName

    // 🔥 JOIN ROOM
    socket.emit("join-group-call", {
        groupId,
        user: loggedUser
    })
}

// ✅ ADD VIDEO
function addVideo(name, stream, muted = false, id = "") {

    if (id && document.getElementById(id)) return

    const video = document.createElement("video")
    video.autoplay = true
    video.srcObject = stream
    video.muted = muted

    if (id) video.id = id

    const div = document.createElement("div")
    div.appendChild(video)

    const label = document.createElement("p")
    label.innerText = name

    div.appendChild(label)

    document.getElementById("usersGrid").appendChild(div)
}

// ✅ CREATE PEER
function createPeer(userEmail, initiator, signal = null) {

    if (peers[userEmail]) return

    const peer = new SimplePeer({
        initiator,
        trickle: false,
        stream: localStream
    })

    peers[userEmail] = peer

    peer.on("signal", data => {

        if (initiator) {
            socket.emit("call-user", {
                to: userEmail,
                offer: data,
                from: loggedUser,
                type: "video"
            })
        } else {
            socket.emit("answer-call", {
                to: userEmail,
                answer: data
            })
        }

    })

    peer.on("stream", stream => {

        const user = groupMembers.find(m => m.email === userEmail)

        addVideo(user ? user.name : userEmail, stream, false, "video-" + userEmail)

    })

    peer.on("close", () => delete peers[userEmail])
    peer.on("error", () => delete peers[userEmail])

    if (signal) peer.signal(signal)
}

// ✅ NEW USER JOINED
socket.on("user-joined-call", ({ user }) => {

    if (user === loggedUser) return

    createPeer(user, true)
})

// ✅ INCOMING CALL
socket.on("incoming-call", ({ from, offer, type }) => {

    if (type !== "video") return

    createPeer(from, false, offer)
})

// ✅ ANSWER RECEIVED
socket.on("call-answered", ({ from, answer }) => {

    if (peers[from]) {
        peers[from].signal(answer)
    }
})

// START
startCall()

</script>

</body>
</html>
