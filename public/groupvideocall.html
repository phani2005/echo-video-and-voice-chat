<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Group Video Call</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        .name {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: .8;
        }

        .users-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            /* center horizontally */
            align-items: flex-start;
            gap: 25px;
            width: 90%;
            margin-bottom: 40px;
        }

        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .user-card video {
            width: 220px;
            height: 160px;
            border-radius: 12px;
            object-fit: cover;
            background: black;
            border: 2px solid #333;
        }

        .user-name {
            margin-top: 6px;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .controls button {
            background: #222;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        .end-btn {
            background: red;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

    <div class="name" id="groupName">Group Video Call</div>

    <div class="timer" id="callTimer">00:00</div>

    <div class="users-grid" id="usersGrid"></div>

    <div class="controls">
        <button onclick="toggleMute()" id="muteBtn">Mute</button>
        <button onclick="toggleCamera()" id="camBtn">Camera Off</button>
    </div>

    <button class="end-btn" onclick="endCall()">End Call</button>

    <!-- KEEP EVERYTHING SAME ABOVE -->

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js" type="module"></script>

<script>

const socket = io(window.location.origin, { transports: ["websocket"] })

const loggedUser = localStorage.getItem("loggedUser")
const receiverEmail = localStorage.getItem("chatWith")
const isGroup = localStorage.getItem("isGroup") === "true"

if (loggedUser) {
    socket.emit("register-user", loggedUser)
}

/* ============================= */
/* ✅ EXISTING PRIVATE CALL POPUP */
/* ============================= */

socket.on("incoming-call", ({ from, offer, type }) => {

    const accept = confirm(`Incoming ${type} call from ${from}`)

    if (!accept) return

    localStorage.setItem("callType", "receiver")
    localStorage.setItem("incomingOffer", JSON.stringify(offer))
    localStorage.setItem("incomingFrom", from)

    if (type === "voice") {
        window.location.href = isGroup
            ? "/groupvoicecall.html"
            : "/voicechat.html"
    }

    if (type === "video") {
        window.location.href = isGroup
            ? "/groupvideocall.html"
            : "/videocall.html"
    }
})

/* ===================================== */
/* 🔥 NEW GROUP CALL POPUP (IMPORTANT FIX) */
/* ===================================== */



/* ============================= */
/* OTHER EXISTING CODE (UNCHANGED) */
/* ============================= */

// YOUR REMAINING CHAT CODE REMAINS SAME
// (I am not repeating everything to avoid confusion)

/* ============================= */
/* VIDEO BUTTON (JOIN LATER WORKS) */
/* ============================= */

document.querySelector(".fa-video").addEventListener("click", () => {

    localStorage.setItem("callType", "caller")

    if (isGroup) {
        window.location.href = "/groupvideocall.html"
    } else {
        window.location.href = "/videocall.html"
    }
})

</script>

</body>

</html>
