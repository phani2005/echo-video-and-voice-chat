<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Group Video Call</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        .name {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: .8;
        }

        .users-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            /* center horizontally */
            align-items: flex-start;
            gap: 25px;
            width: 90%;
            margin-bottom: 40px;
        }

        .user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .user-card video {
            width: 220px;
            height: 160px;
            border-radius: 12px;
            object-fit: cover;
            background: black;
            border: 2px solid #333;
        }

        .user-name {
            margin-top: 6px;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .controls button {
            background: #222;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        .end-btn {
            background: red;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

    <div class="name" id="groupName">Group Video Call</div>

    <div class="timer" id="callTimer">00:00</div>

    <div class="users-grid" id="usersGrid"></div>

    <div class="controls">
        <button onclick="toggleMute()" id="muteBtn">Mute</button>
        <button onclick="toggleCamera()" id="camBtn">Camera Off</button>
    </div>

    <button class="end-btn" onclick="endCall()">End Call</button>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9/simplepeer.min.js"></script>

    <script>

        const socket = io(window.location.origin, { transports: ["websocket"] })

        const loggedUser = localStorage.getItem("loggedUser")
        const groupId = localStorage.getItem("chatWith")

        const usersGrid = document.getElementById("usersGrid")

        let groupMembers = []
        let peers = {}
        let localStream

        let seconds = 0
        let timerInterval
        let isMuted = false
        let camOn = true

        socket.emit("register-user", loggedUser)

        function startTimer() {

            timerInterval = setInterval(() => {

                seconds++

                const mins = Math.floor(seconds / 60)
                const secs = seconds % 60

                document.getElementById("callTimer").innerText =
                    String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0")

            }, 1000)

        }

        async function startGroupCall() {

    localStream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    })

    addLocalVideo()

    const res = await fetch(`/group-members/${groupId}/${loggedUser}`)
    const data = await res.json()

    groupMembers = data.members

    document.getElementById("groupName").innerText = data.groupName

    // 🔥 ADD THIS
    socket.emit("join-group-call", {
        groupId,
        user: loggedUser
    })
}

        function addLocalVideo() {

            const card = document.createElement("div")
            card.className = "user-card"

            card.innerHTML = `
<video autoplay muted></video>
<div class="user-name">You</div>
`

            usersGrid.appendChild(card)

            card.querySelector("video").srcObject = localStream

        }

        function addUserVideo(user, stream) {
            if (document.getElementById("video-" + user.email)) return

            const card = document.createElement("div")
            card.className = "user-card"

            const dp = user.profileimage
                ? user.profileimage
                : "/profilephotodefault.png"

            card.innerHTML = `
<video id="video-${user.email}" autoplay></video>
<div class="user-name">${user.name}</div>
`

            usersGrid.appendChild(card)

            card.querySelector("video").srcObject = stream

        }

        function createPeer(userEmail, initiator, signal = null) {
            if (peers[userEmail]) return

            const peer = new SimplePeer({
                initiator,
                trickle: false,
                stream: localStream
            })

            peers[userEmail] = peer

            peer.on("signal", data => {

                if (initiator) {

                    socket.emit("call-user", {
                        to: userEmail,
                        offer: data,
                        from: loggedUser,
                        type: "video"
                    })

                } else {

                    socket.emit("answer-call", {
                        to: userEmail,
                        answer: data
                    })

                }

            })

            peer.on("stream", stream => {

                const user = groupMembers.find(m => m.email === userEmail)

                if (user) {
                    addUserVideo(user, stream)
                }

                if (!timerInterval) {
                    startTimer()
                }

            })

            if (signal) peer.signal(signal)
            peer.on("close", () => {
    delete peers[userEmail]
})

peer.on("error", () => {
    delete peers[userEmail]
})

        }

        socket.on("incoming-call", ({ from, offer, type }) => {

    if (type !== "video") return

    if (!localStream) {

        navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        }).then(stream => {

            localStream = stream

            addLocalVideo()

            createPeer(from, false, offer)

            // 🔥 ADD THIS
            

        })

    } else {

        createPeer(from, false, offer)

        // 🔥 ADD THIS
        socket.emit("join-group-call", {
            groupId,
            user: loggedUser
        })
    }

})
        socket.on("call-answered", ({ from, answer }) => {

            if (peers[from]) {
                peers[from].signal(answer)
            }

        })

        socket.on("call-ended", () => {

            alert("Call ended")

            window.location.href = "/chat.html"

        })

        function toggleMute() {

            localStream.getAudioTracks().forEach(track => {
                track.enabled = isMuted
            })

            isMuted = !isMuted

            document.getElementById("muteBtn").innerText =
                isMuted ? "Unmute" : "Mute"

        }
        socket.on("user-joined-call", ({ user }) => {

    if (user === loggedUser) return

    if (!peers[user]) {
        createPeer(user, true)
    }

})

        function toggleCamera() {

            localStream.getVideoTracks().forEach(track => {
                track.enabled = !camOn
            })

            camOn = !camOn

            document.getElementById("camBtn").innerText =
                camOn ? "Camera Off" : "Camera On"

        }

        function endCall() {

            socket.emit("end-call", {
                to: groupId,
                from: loggedUser,
                type: "video",
                duration: seconds
            })

            Object.values(peers).forEach(p => p.destroy())

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop())
            }

            clearInterval(timerInterval)

            window.location.href = "/chat.html"

        }

        function goBack() {
            window.location.href = "/chat.html"
        }

        startGroupCall()

    </script>

</body>

</html>
