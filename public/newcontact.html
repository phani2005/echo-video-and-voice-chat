<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#075E54">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
</head>

<body>

    <div class="container">
        <h2>Add Contact</h2>

        <form id="addForm">
            <input type="text" id="name" placeholder="Contact Name" required>
            <input type="email" id="email" placeholder="Contact Email" required>
            <button type="submit">Add</button>
        </form>

    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const loggedUser=localStorage.getItem("loggedUser")

        // ✅ HANDLE AUTO EMAIL (ONLY FROM CHAT PAGE)
        const pendingEmail = localStorage.getItem("pendingContactEmail")

        if (pendingEmail && pendingEmail !== "null" && pendingEmail !== "undefined") {
            document.getElementById("email").value = pendingEmail
            document.getElementById("email").readOnly = true

            // 🔥 clear after using
            localStorage.removeItem("pendingContactEmail")
        } else {
            // ✅ FROM MAIN PAGE → keep empty
            document.getElementById("email").value = ""
            document.getElementById("email").readOnly = false
        }

        // ✅ SUBMIT FORM
        document.getElementById("addForm").addEventListener("submit", async (e) => {
            e.preventDefault()

            const res = await fetch("/addcontact", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                // credentials: "include",
                body: JSON.stringify({
                    ownerEmail: loggedUser,
                    contactEmail: document.getElementById("email").value,
                    contactName: document.getElementById("name").value
                })
            })

            const data = await res.json()

            if (!data.success) {
                alert(data.message)
                return
            }

            window.location.href = "/main.html"
        })
    </script>

</body>

</html>
