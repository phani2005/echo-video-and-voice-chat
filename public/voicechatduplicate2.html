<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .back {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        .name {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .dp {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
        }

        .call-icon {
            font-size: 60px;
            color: #25D366;
            margin-bottom: 30px;
        }

        .end-btn {
            background: red;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

    <div class="name" id="contactName"></div>

    <img id="contactDp" class="dp">

    <i class="fa-solid fa-phone call-icon"></i>
    <div style="display:flex;gap:20px;margin-bottom:30px;">
        <button onclick="toggleMute()" id="muteBtn">Mute</button>
        <button onclick="toggleSpeaker()" id="speakerBtn">Speaker On</button>
    </div>

    <button class="end-btn" onclick="endCall()">End Call</button>
    <audio id="remoteAudio" autoplay playsinline controls></audio>
    <div id="incomingCallBox" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
background:#222;
padding:20px;
text-align:center;
z-index:1000;
">

        <div style="font-size:18px;margin-bottom:10px;" id="callerName"></div>

        <button id="acceptCall" style="
background:#25D366;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:20px;
margin-right:15px;
cursor:pointer;
">
            Answer
        </button>

        <button id="rejectCall" style="
background:red;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:20px;
cursor:pointer;
">
            Reject
        </button>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
        eruda.init();
        if (!navigator.mediaDevices) {
            alert("Media devices not supported. Use HTTPS.")
        }

        const socket = io(window.location.origin, { transports: ["websocket"] })

        const loggedUser = localStorage.getItem("loggedUser")
        const receiver = localStorage.getItem("chatWith")
        const callType = localStorage.getItem("callType")

        let peerConnection
        let localStream
        let pendingCandidates = []

        const servers = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                {
                    urls: "turn:openrelay.metered.ca:80",
                    username: "openrelayproject",
                    credential: "openrelayproject"
                }
            ]
        }

        socket.emit("register-user", loggedUser)

        async function startVoiceCall() {

            localStream = await navigator.mediaDevices.getUserMedia({ audio: true })

            peerConnection = new RTCPeerConnection(servers)

            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream)
            })

            peerConnection.ontrack = event => {
                const audio = document.getElementById("remoteAudio")
                audio.srcObject = event.streams[0]
                audio.autoplay = true
                audio.playsInline = true
                audio.play().catch(e => console.log(e))
            }

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.emit("ice-candidate", {
                        to: receiver,
                        candidate: event.candidate
                    })
                }
            }

            peerConnection.oniceconnectionstatechange = () => {
                console.log("ICE State:", peerConnection.iceConnectionState)
            }

            const offer = await peerConnection.createOffer()
            await peerConnection.setLocalDescription(offer)

            socket.emit("call-user", {
                to: receiver,
                offer,
                from: loggedUser,
                type: "voice"
            })
        }

        socket.on("incoming-call", ({ from, offer, type }) => {

            if (type !== "voice") return

            const callBox = document.getElementById("incomingCallBox")
            const callerName = document.getElementById("callerName")

            callerName.innerText = "Incoming voice call from " + from
            callBox.style.display = "block"
            const dp = localStorage.getItem("chatDp")
            document.getElementById("contactName").innerText =
            localStorage.getItem("chatName") || receiver


            if (dp) {
                document.getElementById("contactDp").src = "/" + dp
            } else {
                document.getElementById("contactDp").src = "/uploads/profilephotodefault.png"
            }

            document.getElementById("acceptCall").onclick = async () => {

                callBox.style.display = "none"

                localStream = await navigator.mediaDevices.getUserMedia({ audio: true })

                peerConnection = new RTCPeerConnection(servers)

                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream)
                })

                peerConnection.ontrack = event => {
                    const audio = document.getElementById("remoteAudio")
                    audio.srcObject = event.streams[0]
                    audio.autoplay = true
                    audio.playsInline = true
                    audio.play().catch(e => console.log(e))
                }

                peerConnection.onicecandidate = event => {
                    if (event.candidate) {
                        socket.emit("ice-candidate", {
                            to: from,
                            candidate: event.candidate
                        })
                    }
                }

                peerConnection.oniceconnectionstatechange = () => {
                    console.log("ICE State:", peerConnection.iceConnectionState)
                }

                await peerConnection.setRemoteDescription(
                    new RTCSessionDescription(offer)
                )

                const answer = await peerConnection.createAnswer()
                await peerConnection.setLocalDescription(answer)

                socket.emit("answer-call", {
                    to: from,
                    answer
                })

            }

            document.getElementById("rejectCall").onclick = () => {
                callBox.style.display = "none"
            }

        })

        socket.on("call-answered", async ({ answer }) => {

            await peerConnection.setRemoteDescription(
                new RTCSessionDescription(answer)
            )

            pendingCandidates.forEach(async c => {
                await peerConnection.addIceCandidate(new RTCIceCandidate(c))
            })

            pendingCandidates = []

        })

        socket.on("ice-candidate", async ({ candidate }) => {

            if (!peerConnection) return

            if (peerConnection.remoteDescription) {
                await peerConnection.addIceCandidate(
                    new RTCIceCandidate(candidate)
                )
            } else {
                pendingCandidates.push(candidate)
            }

        })

        socket.on("call-ended", () => {
            alert("Call ended by other user")
            window.location.href = "/chat.html"
        })

        function endCall() {

            socket.emit("end-call", { to: receiver })

            if (peerConnection) {
                peerConnection.close()
            }

            if (localStream) {
                localStream.getTracks().forEach(t => t.stop())
            }

            window.location.href = "/chat.html"
        }

        if (callType === "caller") {
            startVoiceCall()
        }
    </script>
</body>

</html>
